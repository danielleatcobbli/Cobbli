name: Backend deploy (App Runner)

# Build the FastAPI image, push to ECR, and roll the App Runner service.
# Auth to AWS is via GitHub OIDC (no stored keys) — see backend/scripts/aws-cicd-oidc.sh.
# Runs only when backend code changes on main, or on manual dispatch.

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

concurrency:
  group: backend-deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPO: cobbli-backend
  APPRUNNER_SERVICE: cobbli-backend

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPO:${GITHUB_SHA::7}"
          docker build --platform linux/amd64 -t "$IMAGE" backend
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to App Runner
        run: |
          ARN=$(aws apprunner list-services --region "$AWS_REGION" \
            --query "ServiceSummaryList[?ServiceName=='$APPRUNNER_SERVICE'].ServiceArn | [0]" \
            --output text)
          if [ -z "$ARN" ] || [ "$ARN" = "None" ]; then
            echo "Service $APPRUNNER_SERVICE not found — create it first with backend/scripts/aws-deploy.sh" >&2
            exit 1
          fi
          # update-service REPLACES source config, so preserve the existing
          # ImageConfiguration (port + RuntimeEnvironmentSecrets) and swap only
          # the image tag. Dropping the secrets here would break container start.
          aws apprunner describe-service --region "$AWS_REGION" --service-arn "$ARN" \
            --query 'Service.SourceConfiguration' --output json > current.json
          jq --arg img "$IMAGE" \
            '.ImageRepository.ImageIdentifier = $img
             | {AuthenticationConfiguration, AutoDeploymentsEnabled: false, ImageRepository}' \
            current.json > src.json
          aws apprunner update-service --region "$AWS_REGION" --service-arn "$ARN" \
            --source-configuration file://src.json >/dev/null
          aws apprunner start-deployment --region "$AWS_REGION" --service-arn "$ARN" >/dev/null
          echo "Deployment triggered for $IMAGE"

      - name: Wait for RUNNING
        run: |
          ARN=$(aws apprunner list-services --region "$AWS_REGION" \
            --query "ServiceSummaryList[?ServiceName=='$APPRUNNER_SERVICE'].ServiceArn | [0]" --output text)
          for i in $(seq 1 40); do
            S=$(aws apprunner describe-service --region "$AWS_REGION" --service-arn "$ARN" \
              --query 'Service.Status' --output text)
            echo "status: $S"
            case "$S" in
              RUNNING) exit 0;;
              CREATE_FAILED|DELETE_FAILED) exit 1;;
            esac
            sleep 15
          done
          echo "Timed out waiting for RUNNING" >&2; exit 1
